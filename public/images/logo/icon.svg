<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变：紫色到靛蓝 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    
    <!-- 辅助渐变 -->
    <linearGradient id="accentGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 主背景圆形 -->
  <circle cx="32" cy="32" r="30" fill="url(#mainGrad)"/>
  
  <!-- 抽象图形：流动的曲线1 -->
  <path d="M16 32 Q24 16, 32 24 Q40 32, 48 32" 
        stroke="white" 
        stroke-width="3" 
        fill="none"
        stroke-linecap="round"
        opacity="0.7"/>
  
  <!-- 抽象图形：流动的曲线2 -->
  <path d="M16 32 Q24 48, 32 40 Q40 32, 48 32" 
        stroke="white" 
        stroke-width="3" 
        fill="none"
        stroke-linecap="round"
        opacity="0.7"/>
  
  <!-- 中心圆形光晕 -->
  <circle cx="32" cy="32" r="12" fill="white" opacity="0.2"/>
  <circle cx="32" cy="32" r="8" fill="white" opacity="0.4"/>
  
  <!-- 抽象N字母 - 用曲线表示 -->
  <path d="M26 38 L26 26 L38 38 L38 26" 
        stroke="white" 
        stroke-width="3" 
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.9"/>
  
  <!-- 装饰圆点 -->
  <circle cx="20" cy="20" r="3" fill="white" opacity="0.5"/>
  <circle cx="44" cy="20" r="3" fill="white" opacity="0.5"/>
  <circle cx="20" cy="44" r="3" fill="white" opacity="0.5"/>
  <circle cx="44" cy="44" r="3" fill="white" opacity="0.5"/>
</svg>
