<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变：紫色到靛蓝 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    
    <!-- 辅助渐变 -->
    <linearGradient id="accentGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 阴影效果 -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#8B5CF6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 主背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#mainGrad)" filter="url(#shadow)"/>
  
  <!-- 抽象图形：流动的曲线1 -->
  <path d="M128 256 Q192 128, 256 192 Q320 256, 384 256" 
        stroke="white" 
        stroke-width="24" 
        fill="none"
        stroke-linecap="round"
        opacity="0.7"/>
  
  <!-- 抽象图形：流动的曲线2 -->
  <path d="M128 256 Q192 384, 256 320 Q320 256, 384 256" 
        stroke="white" 
        stroke-width="24" 
        fill="none"
        stroke-linecap="round"
        opacity="0.7"/>
  
  <!-- 中心圆形光晕 -->
  <circle cx="256" cy="256" r="96" fill="white" opacity="0.15"/>
  <circle cx="256" cy="256" r="64" fill="white" opacity="0.3"/>
  <circle cx="256" cy="256" r="32" fill="white" opacity="0.5"/>
  
  <!-- 抽象N字母 - 用曲线表示 -->
  <path d="M208 304 L208 208 L304 304 L304 208" 
        stroke="white" 
        stroke-width="24" 
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.9"/>
  
  <!-- 装饰圆点 -->
  <circle cx="160" cy="160" r="24" fill="white" opacity="0.5"/>
  <circle cx="352" cy="160" r="24" fill="white" opacity="0.5"/>
  <circle cx="160" cy="352" r="24" fill="white" opacity="0.5"/>
  <circle cx="352" cy="352" r="24" fill="white" opacity="0.5"/>
  
  <!-- 外圈装饰 -->
  <circle cx="256" cy="256" r="220" stroke="white" stroke-width="2" fill="none" opacity="0.2"/>
</svg>
